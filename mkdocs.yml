site_name: ウェブハンドリング技術解説
site_description: ロールトゥロール搬送の理論と実践
site_author: あなたの名前

theme:
  name: material
  language: ja
  palette:
    scheme: slate
    primary: blue
    accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js