site_name: ウェブハンドリング技術解説
site_description: ロールトゥロール搬送の理論と実践
site_author: はじめ
site_url: https://hajime-tech.github.io/web-handling/

theme:
  name: material
  language: ja

  # ライト／ダーク両対応：OS設定追従＋トグルで切替
  palette:
    # ライトモード
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: ダークモードに切替
    # ダークモード
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切替

  # フォント（Google Fontsから自動取得）
  font:
    text: Noto Sans JP
    code: JetBrains Mono

  features:
    # ナビゲーション
    - navigation.tabs           # 上部水平タブ（カテゴリ）
    - navigation.tabs.sticky    # スクロール時もタブ固定
    - navigation.sections       # 左サイドバーをセクション展開
    - navigation.top            # ページトップに戻るボタン
    - navigation.instant        # 高速ページ遷移（SPA風）
    - navigation.tracking       # URLにスクロール位置反映
    # 目次（右サイド）
    - toc.follow                # スクロールに追従して現在位置ハイライト
    # 検索
    - search.highlight          # 検索ワードをハイライト
    - search.suggest            # 入力時にサジェスト
    - search.share              # 検索URL共有
    # コードブロック
    - content.code.copy         # コピー ボタン
    - content.code.annotate     # 行注釈
    # その他
    - content.tabs.link         # タブ連動
    - announce.dismiss          # アナウンスバー閉じる

  icon:
    repo: fontawesome/brands/github

# リポジトリリンク（右上に表示）
repo_url: https://github.com/hajime-tech/web-handling
repo_name: hajime-tech/web-handling

# フッタ
copyright: Copyright &copy; 2026 はじめ — ウェブハンドリング技術解説

markdown_extensions:
  # 数式
  - pymdownx.arithmatex:
      generic: true
  # Mermaid / シンタックスハイライト統合
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # 注釈・タブ・絵文字・キャプションなど
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde         # ~~取消線~~
  - pymdownx.caret         # ^^下線^^
  - pymdownx.mark          # ==マーカー==
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true       # 見出し横にリンク記号
      toc_depth: 3

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hajime-tech/web-handling
      name: GitHub リポジトリ

nav:
  - ホーム: index.md
  - 基礎知識:
    - ウェブハンドリングとは: basics/overview.md
    - 用語・記号一覧: basics/glossary.md
    - 材料特性:
      - フィルム: basics/material-film.md
      - 紙: basics/material-paper.md
      - 金属箔: basics/material-foil.md
  - テンション制御:
    - 基本理論: tension/theory.md
    - オイラーの摩擦式: tension/euler.md
    - テンション分布: tension/distribution.md
    - 制御機器の選定: tension/devices.md
  - ロール・搬送系の力学:
    - ロール周りの力学: roll/mechanics.md
    - ニップ力と変形: roll/nip.md
    - 駆動系の設計: roll/drive.md
    - マイクログルーブローラ: roll/micro-groove.md
  - 蛇行制御:
    - 発生メカニズム: steering/mechanism.md
    - ガイドロールの設計: steering/guide-roll.md
    - 自動蛇行修正装置: steering/auto-guide.md
  - トラブルシューティング:
    - しわの原因と対策: trouble/wrinkle.md
    - テンション変動の対策: trouble/tension.md
    - 蛇行トラブルの対策: trouble/steering.md
